app = "aveli"
primary_region = "arn"
kill_signal = "SIGTERM"
kill_timeout = "5s"

[build]
  dockerfile = "backend/Dockerfile"
  context = "."

[deploy]
  release_command = "python -m backend.bootstrap.baseline_v2_cutover"

[env]
  APP_ENV = "production"
  CORS_ALLOW_ORIGIN_REGEX = "^https?://localhost(:\\d+)?$"
  PORT = "8080"

[processes]
  app = "python -m backend.bootstrap.run_server"
  worker = "env RUN_MEDIA_WORKER=true RUN_COURSE_DRIP_WORKER=true python -m backend.bootstrap.run_worker"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 2
  processes = ["app"]

[checks]
  [checks.healthz]
    type = "http"
    port = 8080
    interval = "15s"
    timeout = "5s"
    grace_period = "60s"
    method = "get"
    path = "/healthz"
    processes = ["app"]
