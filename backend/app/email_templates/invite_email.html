<!doctype html>
<html lang="en">
  <body style="margin:0;padding:0;background-color:#f6f1ea;font-family:Arial,sans-serif;color:#1f2933;">
    <div style="max-width:600px;margin:0 auto;padding:32px 20px;">
      <div style="background-color:#ffffff;border:1px solid #eadfce;border-radius:16px;padding:32px;">
        <p style="margin:0 0 16px;font-size:14px;letter-spacing:0.08em;text-transform:uppercase;color:#8c6840;">
          You're Invited
        </p>
        <h1 style="margin:0 0 16px;font-size:28px;line-height:1.2;color:#111827;">
          Join Aveli
        </h1>
        <p style="margin:0 0 24px;font-size:16px;line-height:1.6;color:#374151;">
          {% if inviter_email %}
          {{ inviter_email }} invited you to create your Aveli account.
          {% else %}
          You have been invited to create your Aveli account.
          {% endif %}
        </p>
        <p style="margin:0 0 24px;">
          <a
            href="{{ invite_url }}"
            style="display:inline-block;background-color:#111827;color:#ffffff;text-decoration:none;padding:14px 22px;border-radius:999px;font-size:16px;font-weight:700;"
          >
            Accept invitation
          </a>
        </p>
        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#6b7280;">
          If the button does not work, copy and paste this link into your browser:
        </p>
        <p style="margin:0;font-size:14px;line-height:1.6;word-break:break-word;">
          <a href="{{ invite_url }}" style="color:#8c6840;text-decoration:underline;">{{ invite_url }}</a>
        </p>
      </div>
    </div>
  </body>
</html>
