services:
  db:
    image: postgres:15
    container_name: aveli-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aveli_local
    ports:
      - "54322:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env.local
    environment:
      APP_ENV: ${APP_ENV:-development}
      PORT: ${PORT:-8080}
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME:-aveli_local}
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SECRET_API_KEY: ${SUPABASE_SECRET_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      MEDIA_SIGNING_SECRET: ${MEDIA_SIGNING_SECRET:-dev-media-signing-secret}
    depends_on:
      - db
    volumes:
      - ./backend/assets:/app/assets:ro
      - ./backend/media:/app/media
    ports:
      - "${PORT:-8080}:${PORT:-8080}"

  landing:
    build:
      context: ./frontend/landing
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://backend:8080}
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
